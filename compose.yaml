services:
  licitapro:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "${PORT:-8000}"
      HISTORICO_FILE: "${HISTORICO_FILE:-/data/historico.json}"
    volumes:
      - licitapro_data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      licitapro:
        condition: service_healthy
    environment:
      APP_HOST: "${APP_HOST:-:80}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  licitapro_data:
  caddy_data:
  caddy_config:
